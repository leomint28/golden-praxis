<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 52" width="230" height="52" fill="none">
  <!-- Concentric arc symbol — all semicircles centered at (24, 26), opening right -->
  <!-- Outer arc: r=22 -->
  <path d="M 24 4 A 22 22 0 0 0 24 48" stroke="#c8a040" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Middle arc: r=14 -->
  <path d="M 24 12 A 14 14 0 0 0 24 40" stroke="#c8a040" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Inner arc: r=8 -->
  <path d="M 24 18 A 8 8 0 0 0 24 34" stroke="#c8a040" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="24" cy="26" r="3.5" fill="#c8a040"/>

  <!-- Wordmark — gold for dark backgrounds -->
  <text
    x="52" y="32"
    font-family="'Cormorant Garamond', 'Cormorant', Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#d4b86a"
    letter-spacing="0.6">Golden Praxis</text>
</svg>
